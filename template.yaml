AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: CRUD de personas - Lambda, API Gateway, Cognito y RDS MySQL

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
  DatabaseInstanceClass:
    Type: String
    Default: db.t4g.micro

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    Timeout: 15
    MemorySize: 256
    Tracing: Active

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.20.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{ Key: Name, Value: !Sub "crud-${Environment}-vpc" }]

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.20.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.20.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Salida de Lambda hacia RDS MySQL
      VpcId: !Ref Vpc

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: MySQL solo desde Lambda
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  SecretsEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HTTPS desde Lambda al endpoint de Secrets Manager
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.secretsmanager"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB]
      SecurityGroupIds: [!Ref SecretsEndpointSecurityGroup]

  DatabaseSubnets:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subredes privadas para MySQL
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB]

  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Credenciales del CRUD MySQL
      GenerateSecretString:
        SecretStringTemplate: '{"username":"crud_admin"}'
        GenerateStringKey: password
        PasswordLength: 30
        ExcludeCharacters: '"@/'

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: mysql
      DBInstanceClass: !Ref DatabaseInstanceClass
      AllocatedStorage: 20
      MaxAllocatedStorage: 100
      StorageType: gp3
      StorageEncrypted: true
      DBName: crud_personas
      MasterUsername: !Sub "{{resolve:secretsmanager:${DatabaseSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DatabaseSecret}:SecretString:password}}"
      DBSubnetGroupName: !Ref DatabaseSubnets
      VPCSecurityGroups: [!GetAtt DatabaseSecurityGroup.GroupId]
      PubliclyAccessible: false
      BackupRetentionPeriod: 0
      DeletionProtection: false

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "crud-${Environment}-usuarios"
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "crud-${Environment}-web"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  CrudApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "crud-${Environment}-api"
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn

  CrudFunction:
    Type: AWS::Serverless::Function
    DependsOn: SecretsManagerEndpoint
    Properties:
      CodeUri: .
      Handler: src/lambda.handler
      Environment:
        Variables:
          DB_HOST: !GetAtt Database.Endpoint.Address
          DB_PORT: 3306
          DB_NAME: crud_personas
          DB_SECRET_ARN: !Ref DatabaseSecret
          DB_CONNECTION_LIMIT: 2
      VpcConfig:
        SecurityGroupIds: [!GetAtt LambdaSecurityGroup.GroupId]
        SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB]
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref DatabaseSecret
      Events:
        Health:
          Type: Api
          Properties:
            RestApiId: !Ref CrudApi
            Path: /health
            Method: get
            Auth: { Authorizer: NONE }
        Create: { Type: Api, Properties: { RestApiId: !Ref CrudApi, Path: /api/personas, Method: post } }
        List: { Type: Api, Properties: { RestApiId: !Ref CrudApi, Path: /api/personas, Method: get } }
        Get: { Type: Api, Properties: { RestApiId: !Ref CrudApi, Path: "/api/personas/{id}", Method: get } }
        Put: { Type: Api, Properties: { RestApiId: !Ref CrudApi, Path: "/api/personas/{id}", Method: put } }
        Patch: { Type: Api, Properties: { RestApiId: !Ref CrudApi, Path: "/api/personas/{id}", Method: patch } }
        Delete: { Type: Api, Properties: { RestApiId: !Ref CrudApi, Path: "/api/personas/{id}", Method: delete } }
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/lambda.js]
        Minify: true
        Sourcemap: false
        Target: es2022

Outputs:
  ApiUrl:
    Value: !Sub "https://${CrudApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${Environment}"
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
